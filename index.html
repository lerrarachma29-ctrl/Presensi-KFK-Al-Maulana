<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi & Jurnal - KFK Al-Maulana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kfk-red: #e11d48;
            --kfk-red-dark: #be123c;
            --kfk-blue: #3b82f6;
            --bg-dark: #0f172a;
        }

        body { 
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(225, 29, 72, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input, .input-group select, .input-group textarea {
            background-color: rgba(15, 23, 42, 0.5) !important;
            color: white !important;
            border: 1px solid rgba(71, 85, 105, 0.4) !important;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--kfk-red) !important;
            background-color: rgba(15, 23, 42, 0.8) !important;
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--kfk-red) 0%, var(--kfk-red-dark) 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%; border-top-color: #fff; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .maps-link {
            display: none;
            color: #3b82f6;
            font-size: 10px;
            font-weight: 700;
            text-decoration: underline;
            margin-top: 4px;
        }

        .map-preview {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            margin-top: 10px;
            background: #1e293b;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto;
        }
        .check-icon {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            box-sizing: content-box;
            border: 4px solid #4caf50;
        }
        .check-icon::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 40px;
            width: 20px;
            height: 40px;
            border: solid #4caf50;
            border-width: 0 4px 4px 0;
            transform: rotate(45deg);
            transform-origin: left top;
            animation: checkmark 0.8s ease;
        }
        @keyframes checkmark {
            0% { height: 0; width: 0; opacity: 1; }
            20% { height: 0; width: 20px; opacity: 1; }
            40% { height: 40px; width: 20px; opacity: 1; }
            100% { height: 40px; width: 20px; opacity: 1; }
        }

        .hidden-el { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">
    <div class="bg-glow"></div>

    <div class="max-w-md w-full py-6">
        <div class="text-center mb-8">
            <div class="inline-block p-[2px] rounded-2xl bg-gradient-to-tr from-rose-600 to-blue-500 mb-4">
                <div class="bg-slate-900 rounded-[14px] px-6 py-2">
                    <h1 class="text-3xl font-black italic tracking-tighter">
                        <span class="text-rose-500">KFK</span> <span class="text-blue-400">AL-MAULANA</span>
                    </h1>
                </div>
            </div>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">Portal Presensi Digital</p>
        </div>

        <!-- Formulir Utama -->
        <div id="formContainer" class="glass-card p-8 mb-8">
            <form id="attendanceForm" class="space-y-6">
                <!-- Nama -->
                <div class="input-group">
                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-2 ml-1">Nama</label>
                    <input type="text" id="nama" required class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Masukkan Nama Lengkap">
                </div>

                <!-- Divisi -->
                <div class="input-group">
                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-2 ml-1">Divisi</label>
                    <input type="text" id="divisi" required class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Masukkan Divisi / Unit Kerja">
                </div>

                <!-- Status Kehadiran -->
                <div class="input-group">
                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-2 ml-1">Status Kehadiran</label>
                    <select id="status" class="w-full px-4 py-3 rounded-xl text-sm cursor-pointer appearance-none">
                        <option value="Hadir">🟢 Hadir Bekerja</option>
                        <option value="Izin">🟡 Izin / Sakit</option>
                        <option value="Dinas Luar">🔵 Dinas Luar</option>
                    </select>
                </div>

                <!-- Jobdesk -->
                <div class="input-group">
                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-2 ml-1">Jobdesk</label>
                    <select id="jobdesk" class="w-full px-4 py-3 rounded-xl text-sm cursor-pointer appearance-none">
                        <option value="" disabled selected>Pilih Tugas Hari Ini</option>
                        <option value="Menyelesaikan LPJ">📋 Menyelesaikan LPJ</option>
                        <option value="Memberikan makan ayam">🐔 Memberikan makan ayam</option>
                    </select>
                </div>

                <!-- Detail Aktivitas -->
                <div class="input-group">
                    <label class="block text-[10px] font-extrabold text-slate-500 uppercase mb-2 ml-1">Detail Aktivitas</label>
                    <textarea id="jurnal" rows="3" required class="w-full px-4 py-3 rounded-xl text-sm resize-none" placeholder="Apa yang Anda kerjakan hari ini?"></textarea>
                </div>

                <!-- Lokasi dengan Map Preview -->
                <div class="bg-slate-900/60 p-5 rounded-2xl border border-white/5 shadow-inner">
                    <div class="flex items-center justify-between mb-1">
                        <h4 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Titik Koordinat</h4>
                        <button type="button" onclick="getLocation()" class="text-[9px] text-blue-400 font-bold hover:underline">RE-SCAN</button>
                    </div>
                    <p id="coordsText" class="text-xs text-slate-300 font-mono italic loading-pulse">Mendeteksi lokasi...</p>
                    
                    <div id="mapPreview" class="map-preview">
                        <iframe id="mapFrame" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>

                    <a id="googleMapsLink" href="#" target="_blank" class="maps-link uppercase tracking-tighter">🗺️ Detail di Google Maps</a>
                    <input type="hidden" id="coords">
                </div>

                <button type="submit" id="btnSubmit" class="btn-primary w-full text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-3 shadow-xl uppercase tracking-widest text-xs">
                    Submit Presensi
                </button>
            </form>
        </div>

        <!-- Tampilan Berhasil -->
        <div id="successContainer" class="glass-card p-8 mb-8 text-center hidden-el">
            <div class="success-checkmark mb-6">
                <div class="check-icon"></div>
            </div>
            <h2 class="text-xl font-bold text-white mb-2">Presensi Berhasil!</h2>
            <p class="text-slate-400 text-sm mb-6">Laporan Anda telah tercatat secara digital di sistem pusat.</p>
            
            <div class="bg-slate-900/40 rounded-2xl p-4 mb-6 text-left border border-white/5">
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Karyawan</span>
                    <span id="resNama" class="text-[10px] text-white font-bold uppercase"></span>
                </div>
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Waktu</span>
                    <span id="resWaktu" class="text-[10px] text-white font-bold uppercase"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Status</span>
                    <span id="resStatus" class="text-[10px] text-green-400 font-bold uppercase">TERVERIFIKASI</span>
                </div>
            </div>

            <button onclick="backToForm()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl border border-white/10 transition-all text-[10px] uppercase tracking-widest">
                Kirim Presensi Lain
            </button>
        </div>

        <p class="text-center text-[9px] text-slate-500 font-bold tracking-[0.4em]">© 2024 KFK INFRASTRUCTURE</p>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-6 py-3 rounded-2xl text-xs font-black opacity-0 transition-all duration-500 shadow-2xl z-50">
        <span id="toastMsg">Berhasil!</span>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzPoZTWtTE9ii_A3xEU63Fl1PlRZhH1DhBWPBcsGCfqlcv4bft2mQsGJLo0VPqKkdGG/exec'; 
        
        const form = document.getElementById('attendanceForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const coordsText = document.getElementById('coordsText');
        const coordsInput = document.getElementById('coords');
        const mapsLink = document.getElementById('googleMapsLink');
        const mapPreview = document.getElementById('mapPreview');
        const mapFrame = document.getElementById('mapFrame');
        
        const formContainer = document.getElementById('formContainer');
        const successContainer = document.getElementById('successContainer');

        function getLocation() {
            coordsText.innerText = "Mendeteksi lokasi...";
            coordsText.classList.add('loading-pulse');
            mapsLink.style.display = "none";
            mapPreview.style.display = "none";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lon = pos.coords.longitude.toFixed(6);
                        const locString = `${lat}, ${lon}`;
                        
                        coordsInput.value = locString;
                        coordsText.innerText = locString;
                        coordsText.classList.remove('loading-pulse');
                        
                        // Set link Google Maps
                        mapsLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                        mapsLink.style.display = "block";

                        // Set preview peta dalam iFrame
                        const embedUrl = `https://maps.google.com/maps?q=${lat},${lon}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
                        mapFrame.src = embedUrl;
                        mapPreview.style.display = "block";
                    },
                    (err) => { 
                        coordsText.innerText = "GPS Gagal terdeteksi. Pastikan GPS aktif."; 
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                coordsText.innerText = "Browser tidak mendukung lokasi.";
            }
        }

        window.onload = () => {
            getLocation();
            const saved = JSON.parse(localStorage.getItem('kfk_user_info'));
            if(saved) {
                document.getElementById('nama').value = saved.nama;
                document.getElementById('divisi').value = saved.divisi;
                if(saved.jobdesk) {
                    const jobSelect = document.getElementById('jobdesk');
                    for (let i = 0; i < jobSelect.options.length; i++) {
                        if (jobSelect.options[i].value === saved.jobdesk) {
                            jobSelect.selectedIndex = i;
                            break;
                        }
                    }
                }
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            if(!scriptURL || scriptURL === '') {
                showToast("URL Script belum diisi!");
                return;
            }

            if(!coordsInput.value) { 
                showToast("GPS Belum Terdeteksi!"); 
                return; 
            }

            const jobdeskSelect = document.getElementById('jobdesk');
            if(!jobdeskSelect.value) { 
                showToast("Pilih Jobdesk Terlebih Dahulu!"); 
                return; 
            }

            const data = {
                nama: document.getElementById('nama').value,
                divisi: document.getElementById('divisi').value,
                status: document.getElementById('status').value,
                jobdesk: jobdeskSelect.value,
                jurnal: document.getElementById('jurnal').value,
                lokasi: `https://www.google.com/maps?q=${coordsInput.value}`
            };

            localStorage.setItem('kfk_user_info', JSON.stringify({
                nama: data.nama, 
                divisi: data.divisi,
                jobdesk: data.jobdesk
            }));

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<div class="spinner"></div>`;

            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });
                
                showSuccessScreen(data.nama);
            } catch (error) {
                console.error('Error!', error.message);
                showToast("GAGAL MENGIRIM! Periksa URL Script.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Submit Presensi";
            }
        };

        function showSuccessScreen(nama) {
            document.getElementById('resNama').innerText = nama;
            document.getElementById('resWaktu').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';
            
            formContainer.classList.add('hidden-el');
            successContainer.classList.remove('hidden-el');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToForm() {
            successContainer.classList.add('hidden-el');
            formContainer.classList.remove('hidden-el');
            document.getElementById('jurnal').value = "";
            getLocation();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            toast.style.top = '40px';
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.top = '10px'; 
            }, 3000);
        }
    </script>
</body>
</html>
