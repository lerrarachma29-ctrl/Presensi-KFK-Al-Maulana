<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi & Jurnal - KFK Al-Maulana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kfk-red: #e11d48;
            --kfk-red-dark: #be123c;
            --kfk-blue: #3b82f6;
            --bg-dark: #0f172a;
        }

        body { 
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(225, 29, 72, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-group input, .input-group select, .input-group textarea {
            background-color: rgba(15, 23, 42, 0.5) !important;
            color: white !important;
            border: 1px solid rgba(71, 85, 105, 0.4) !important;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--kfk-red) !important;
            background-color: rgba(15, 23, 42, 0.8) !important;
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
            outline: none;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--kfk-red);
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--kfk-red) 0%, var(--kfk-red-dark) 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.4);
        }

        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%; border-top-color: #fff; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .map-preview {
            width: 100%; height: 160px; border-radius: 18px; margin-top: 12px;
            background: #1e293b; display: none; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden-el { display: none; }
        
        /* Transition untuk elemen berantai */
        .chain-container {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
        }
        .chain-container.show {
            max-height: 2000px; 
            opacity: 1;
            transform: translateY(0);
            margin-top: 1.25rem; 
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex items-center justify-center">
    <div class="bg-glow"></div>

    <div class="max-w-lg w-full py-8">
        <!-- Header Section -->
        <div class="text-center mb-10">
            <div class="inline-block p-[2px] rounded-2xl bg-gradient-to-tr from-rose-600 to-blue-500 mb-5 shadow-lg shadow-rose-500/10">
                <div class="bg-slate-900 rounded-[14px] px-8 py-3">
                    <h1 class="text-4xl font-black italic tracking-tighter">
                        <span class="text-rose-500">KFK</span> <span class="text-blue-400">AL-MAULANA</span>
                    </h1>
                </div>
            </div>
            <p class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.4em] opacity-80">Sistem Presensi Terintegrasi</p>
        </div>

        <div id="formContainer" class="glass-card p-6 md:p-10">
            <form id="attendanceForm" class="flex flex-col gap-y-6">
                
                <!-- Identitas -->
                <div class="flex flex-col gap-y-5">
                    <div class="input-group">
                        <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2.5 ml-1 tracking-wider">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full px-5 py-4 rounded-2xl text-sm" placeholder="Masukkan nama Anda">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="input-group">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2.5 ml-1 tracking-wider">Unit Kerja</label>
                            <select id="unit_kerja" required class="w-full px-5 py-4 rounded-2xl text-sm cursor-pointer appearance-none">
                                <option value="" disabled selected>Pilih Unit</option>
                                <option value="Yayasan">Yayasan</option>
                                <option value="PKBM Al Fayyad">PKBM Al Fayyad</option>
                                <option value="PKBM Ziyadatul Baraka">PKBM Ziyadatul Baraka</option>
                                <option value="PKBM Al-Fayyad 2">PKBM Al-Fayyad 2</option>
                                <option value="RA Al-Fayyad">RA Al-Fayyad</option>
                                <option value="MI Al-Maulana">MI Al-Maulana</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2.5 ml-1 tracking-wider">Jabatan</label>
                            <input type="text" id="jabatan" required class="w-full px-5 py-4 rounded-2xl text-sm" placeholder="Contoh: Admin">
                        </div>
                    </div>
                </div>

                <hr class="border-white/5 my-1"> <!-- Margin dikurangi agar jarak tidak terlalu jauh -->

                <!-- Kehadiran & Rantai Izin -->
                <div class="flex flex-col">
                    <div class="input-group">
                        <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2.5 ml-1 tracking-wider">Status Kehadiran</label>
                        <select id="status" onchange="handleStatusChange()" class="w-full px-5 py-4 rounded-2xl text-sm cursor-pointer appearance-none">
                            <option value="Hadir">🟢 Hadir Bekerja</option>
                            <option value="Izin">🟡 Izin / Sakit</option>
                            <option value="Dinas Luar">🔵 Dinas Luar</option>
                        </select>
                    </div>

                    <div id="container_alasan" class="chain-container">
                        <div class="flex flex-col gap-y-5 p-5 bg-white/5 rounded-3xl border border-white/5">
                            <div class="input-group">
                                <label class="block text-[11px] font-extrabold text-slate-400 uppercase mb-2 ml-1">Kategori Izin</label>
                                <select id="alasan_izin" onchange="handleAlasanChange()" class="w-full px-4 py-3 rounded-xl text-sm appearance-none">
                                    <option value="" selected disabled>Pilih Alasan</option>
                                    <option value="Sakit (Surat Dokter)">Sakit (Surat Dokter)</option>
                                    <option value="Sakit (Tanpa Surat)">Sakit (Tanpa Surat)</option>
                                    <option value="Keperluan Keluarga">Keperluan Keluarga</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div id="container_keterangan_izin" class="chain-container">
                                <div class="input-group">
                                    <label class="block text-[11px] font-extrabold text-slate-400 uppercase mb-2 ml-1">Detail Alasan</label>
                                    <input type="text" id="keterangan_izin" class="w-full px-4 py-3 rounded-xl text-sm" placeholder="Sebutkan detail alasan...">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="border-white/5 my-1">

                <!-- Jobdesk & Rantai Checklist/Jurnal -->
                <div class="flex flex-col">
                    <div class="input-group">
                        <label class="block text-[11px] font-extrabold text-slate-500 uppercase mb-2.5 ml-1 tracking-wider">Kategori Jobdesk</label>
                        <select id="jobdesk" required onchange="handleJobdeskChange()" class="w-full px-5 py-4 rounded-2xl text-sm cursor-pointer appearance-none">
                            <option value="" disabled selected>Pilih Jobdesk</option>
                            <option value="Kebersihan dan Kerapihan">✨ Kebersihan dan Kerapihan</option>
                            <option value="Perlengkapan Gedung">🏗️ Perlengkapan Gedung</option>
                            <option value="Membuat Jadwal Piket Bulanan">📅 Membuat Jadwal Piket Bulanan</option>
                            <option value="Koperasi">🛒 Koperasi</option>
                            <option value="Tabungan">💰 Tabungan</option>
                            <option value="Penanggung Jawab Laporan BOSP dan Operasional Yayasan">🧾 PJ Laporan BOSP & Operasional</option>
                            <option value="Bendahara Operasional Yayasan">💳 Bendahara Operasional Yayasan</option>
                            <option value="Media Sosial dan Admin Yayasan">📱 Media Sosial dan Admin Yayasan</option>
                            <option value="Membuat Jadwal program kerja bulanan">🗓️ Membuat Jadwal Program Kerja</option>
                            <option value="Control laporan satuan pendidikan">🔎 Control Laporan Satuan Pendidikan</option>
                            <option value="Panitia Program">🤝 Panitia Program</option>
                            <option value="Lainnya">📝 Lainnya</option>
                        </select>
                    </div>

                    <div id="container_checklist" class="chain-container">
                        <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                            <label class="block text-[11px] font-extrabold text-rose-400 uppercase mb-4 ml-1 tracking-wider">Tugas Hari Ini</label>
                            <div id="checklist_items" class="grid grid-cols-1 gap-2"></div>
                        </div>
                    </div>

                    <div id="container_jurnal" class="chain-container">
                        <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                            <label class="block text-[11px] font-extrabold text-slate-400 uppercase mb-2 ml-1">Catatan Aktivitas Tambahan</label>
                            <textarea id="jurnal" rows="4" class="w-full px-4 py-3 rounded-xl text-sm resize-none" placeholder="Tuliskan rincian kegiatan Anda..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Lokasi -->
                <div class="bg-slate-900/60 p-6 rounded-3xl border border-white/5 shadow-inner">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                            <h4 class="text-[11px] font-bold text-blue-400 uppercase tracking-widest">Validasi Lokasi</h4>
                        </div>
                        <button type="button" onclick="getLocation()" class="text-[10px] text-blue-400 font-bold hover:text-white transition-colors">REFRESH GPS</button>
                    </div>
                    <div id="locStatus" class="text-xs text-slate-500 italic mb-1">Mendeteksi titik koordinat...</div>
                    <div id="mapPreview" class="map-preview">
                        <iframe id="mapFrame" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                    <a id="googleMapsLink" href="#" target="_blank" class="hidden text-[10px] text-blue-400 font-bold underline mt-3 block">Buka di Google Maps →</a>
                    <input type="hidden" id="coords">
                </div>

                <button type="submit" id="btnSubmit" class="btn-primary w-full text-white font-bold py-5 rounded-2xl flex justify-center items-center gap-4 shadow-xl uppercase tracking-[0.2em] text-xs">
                    Submit Presensi
                </button>
            </form>
        </div>

               <!-- Tampilan Berhasil -->
        <div id="successContainer" class="glass-card p-8 mb-8 text-center hidden-el">
            <div class="success-checkmark mb-6">
                <div class="check-icon"></div>
            </div>
            <h2 class="text-xl font-bold text-white mb-2">Presensi Berhasil!</h2>
            <p class="text-slate-400 text-sm mb-6">Laporan Anda telah tercatat secara digital di sistem pusat.</p>
            
            <div class="bg-slate-900/40 rounded-2xl p-4 mb-6 text-left border border-white/5">
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Karyawan</span>
                    <span id="resNama" class="text-[10px] text-white font-bold uppercase"></span>
                </div>
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Waktu</span>
                    <span id="resWaktu" class="text-[10px] text-white font-bold uppercase"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Status</span>
                    <span id="resStatus" class="text-[10px] text-green-400 font-bold uppercase">TERVERIFIKASI</span>
                </div>
            </div>

            <button onclick="backToForm()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl border border-white/10 transition-all text-[10px] uppercase tracking-widest">
                Kirim Presensi Lain
            </button>
        </div>


        <p class="text-center text-[10px] text-slate-600 font-bold tracking-[0.5em] mt-10 uppercase">KFK Infrastructure v2.1</p>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-8 py-4 rounded-2xl text-xs font-black opacity-0 transition-all duration-500 shadow-2xl z-50 pointer-events-none">
        <span id="toastMsg">Berhasil!</span>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwImdYnc0N2WqXDh5WSepfItkPaL2DvFjOxVm84LXh7l-4LEyqcnf8XxXPvaNTAulAS/exec'; 
        
        const jobdeskDetails = {
            "Kebersihan dan Kerapihan": ["Gedung utama", "Kamar Mandi", "Dapur", "Tangga ke lantai 2", "Halaman parkiran", "Depan pagar", "Lingkungan RA"],
            "Perlengkapan Gedung": ["Inventaris Alat (Pembukuan & Cap)", "Pengadaan Barang", "Perbaikan Alat"],
            "Membuat Jadwal Piket Bulanan": ["Membuat jadwal", "Menyebarkan jadwal", "Mereschedule jadwal (sesuai Yayasan)"],
            "Koperasi": ["Melaporkan keuangan", "Menghitung laba & rugi", "Setor laba ke Ketua", "Belanja kebutuhan", "Program marketing koperasi"],
            "Tabungan": ["Setor dana tabungan", "Tarik tunai tabungan", "Program marketing tabungan"],
            "Penanggung Jawab Laporan BOSP dan Operasional Yayasan": ["Admin Pengadaan Barang", "Pemberkasan Laporan BOSP Nonformal"],
            "Bendahara Operasional Yayasan": ["Mengelola dana Operasional", "Melaporkan dana Operasional"],
            "Media Sosial dan Admin Yayasan": ["Desain feed Instagram", "Caption feed Instagram", "Share di grup Yayasan", "Admin Chat/HP Yayasan"],
            "Membuat Jadwal program kerja bulanan": ["Rapat program bulanan", "Membuat jadwal bulanan", "Share jadwal ke Pengurus/Tim"],
            "Control laporan satuan pendidikan": ["Laporan bulanan satdik", "Keuangan Satuan Pendidikan", "Keuangan Unit Usaha"],
            "Panitia Program": ["Penyusunan Panitia", "Pelaksanaan Program", "Evaluasi Program"],
            "Lainnya": []
        };

        const form = document.getElementById('attendanceForm');
        const coordsInput = document.getElementById('coords');
        const locStatus = document.getElementById('locStatus');
        const mapPreview = document.getElementById('mapPreview');
        const mapFrame = document.getElementById('mapFrame');
        const mapsLink = document.getElementById('googleMapsLink');

        function handleStatusChange() {
            const status = document.getElementById('status').value;
            const containerAlasan = document.getElementById('container_alasan');
            if (status === 'Izin') {
                containerAlasan.classList.add('show');
            } else {
                containerAlasan.classList.remove('show');
                document.getElementById('alasan_izin').value = "";
                handleAlasanChange();
            }
        }

        function handleAlasanChange() {
            const alasan = document.getElementById('alasan_izin').value;
            const containerKeterangan = document.getElementById('container_keterangan_izin');
            const inputKet = document.getElementById('keterangan_izin');
            if (alasan === 'Lainnya') {
                containerKeterangan.classList.add('show');
                inputKet.required = true;
            } else {
                containerKeterangan.classList.remove('show');
                inputKet.required = false;
                inputKet.value = "";
            }
        }

        function handleJobdeskChange() {
            const jobdesk = document.getElementById('jobdesk').value;
            const containerChecklist = document.getElementById('container_checklist');
            const containerJurnal = document.getElementById('container_jurnal');
            const checklistItems = document.getElementById('checklist_items');
            const jurnalInput = document.getElementById('jurnal');
            
            checklistItems.innerHTML = ""; 
            
            if (jobdesk === "Lainnya") {
                containerChecklist.classList.remove('show');
                containerJurnal.classList.add('show');
                jurnalInput.required = true;
            } else if (jobdesk && jobdeskDetails[jobdesk]) {
                containerJurnal.classList.remove('show');
                jurnalInput.required = false;
                jurnalInput.value = "";
                
                if (jobdeskDetails[jobdesk].length > 0) {
                    containerChecklist.classList.add('show');
                    jobdeskDetails[jobdesk].forEach(item => {
                        const label = document.createElement('label');
                        label.className = "checkbox-item";
                        label.innerHTML = `<input type="checkbox" name="sub_tugas" value="${item}"><span class="text-xs text-slate-200">${item}</span>`;
                        checklistItems.appendChild(label);
                    });
                } else {
                    containerChecklist.classList.remove('show');
                }
            }
        }

        function getLocation() {
            locStatus.style.display = "block";
            locStatus.innerText = "Mengunci koordinat...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lon = pos.coords.longitude.toFixed(6);
                    coordsInput.value = `${lat}, ${lon}`;
                    locStatus.style.display = "none";
                    mapFrame.src = `https://maps.google.com/maps?q=${lat},${lon}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
                    mapPreview.style.display = "block";
                    mapsLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                    mapsLink.classList.remove('hidden');
                }, () => {
                    locStatus.innerText = "GPS Error. Aktifkan lokasi.";
                });
            }
        }

        window.onload = () => {
            getLocation();
            const saved = JSON.parse(localStorage.getItem('kfk_user_info'));
            if(saved) {
                document.getElementById('nama').value = saved.nama || '';
                document.getElementById('jabatan').value = saved.jabatan || '';
                document.getElementById('unit_kerja').value = saved.unit_kerja || '';
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');

            const checkedItems = Array.from(document.querySelectorAll('input[name="sub_tugas"]:checked')).map(cb => cb.value);
            const statusVal = document.getElementById('status').value;
            const jobdeskVal = document.getElementById('jobdesk').value;
            const jurnalVal = document.getElementById('jurnal').value;

            let finalJurnal = "";
            if (jobdeskVal === "Lainnya") {
                finalJurnal = jurnalVal;
            } else {
                finalJurnal = checkedItems.length > 0 ? `Tugas: ${checkedItems.join(', ')}` : (jurnalVal || "Tugas standar.");
            }

            let finalStatus = statusVal;
            if (statusVal === 'Izin') {
                const alasan = document.getElementById('alasan_izin').value;
                const ket = document.getElementById('keterangan_izin').value;
                finalStatus = (alasan === 'Lainnya') ? `Izin (${ket})` : `Izin (${alasan})`;
            }

            const data = {
                nama: document.getElementById('nama').value,
                unit_kerja: document.getElementById('unit_kerja').value,
                jabatan: document.getElementById('jabatan').value,
                status: finalStatus,
                jobdesk: jobdeskVal,
                jurnal: finalJurnal,
                lokasi: `https://www.google.com/maps?q=${coordsInput.value}`
            };

            localStorage.setItem('kfk_user_info', JSON.stringify({
                nama: data.nama, jabatan: data.jabatan, unit_kerja: data.unit_kerja
            }));

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<div class="spinner"></div>`;

            try {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
                document.getElementById('resNama').innerText = data.nama;
                document.getElementById('resWaktu').innerText = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                document.getElementById('formContainer').classList.add('hidden-el');
                document.getElementById('successContainer').classList.remove('hidden-el');
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (err) {
                showToast("Gagal mengirim data.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Submit Laporan Presensi";
            }
        };

        function backToForm() {
            document.getElementById('successContainer').classList.add('hidden-el');
            document.getElementById('formContainer').classList.remove('hidden-el');
            document.getElementById('jurnal').value = "";
            document.getElementById('status').value = "Hadir";
            handleStatusChange();
            handleJobdeskChange();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1'; toast.style.top = '40px';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.top = '10px'; }, 3000);
        }
    </script>
</body>
</html>
